# wootc first-boot installer menu
# Adapted from wubiuefi's grub.install.cfg
#
# Loaded when root.disk contains no installed OS.
# Boots the deployer initramfs which pulls the bootc OCI image and
# runs fisherman to deploy it into root.disk.
#
# Variables set at runtime by the Windows installer:
#   $(kernel)           — path to deployer vmlinuz
#   $(initrd)           — path to deployer initramfs.img
#   $(wootc_image)      — OCI image ref to pull (e.g. ghcr.io/tuna-os/yellowfin:gnome)
#   $(wootc_hostname)   — hostname for the new system

set default=0
echo "$(title1)"
echo "$(title2)"
if sleep --verbose --interruptible 5 ; then
   set timeout=0
fi
echo

# ── Normal install ─────────────────────────────────────────────────────────
menuentry "$(normal_mode_title)" {
    linux $(kernel) wootc.image=$(wootc_image) wootc.hostname=$(wootc_hostname) quiet
    initrd $(initrd)
}

# ── Debug mode — drops to shell on error ───────────────────────────────────
menuentry "$(verbose_mode_title)" {
    linux $(kernel) wootc.image=$(wootc_image) wootc.hostname=$(wootc_hostname) wootc.debug
    initrd $(initrd)
}
