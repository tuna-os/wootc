# wootc GRUB2 boot configuration
# Adapted from wubiuefi's wubildr.cfg
#
# This file is loaded by GRUB2 after chainloading from Windows Boot Manager.
# It searches for /wootc/disks/root.disk on any partition, loop-mounts it,
# and boots the installed OS. If root.disk is empty (first boot), it falls
# through to grub.install.cfg which boots the deployer initramfs.

set show_panic_message=true

# ── Try to boot from an already-installed root.disk ─────────────────────────
if search -s -f -n /wootc/disks/root.disk; then
    if loopback loopw0 /wootc/disks/root.disk; then
        set root=(loopw0)
        # Check for installed bootloader config
        if [ -e /boot/grub2/grub.cfg ]; then
            set prefix=($root)'/boot/grub2'
            if configfile /boot/grub2/grub.cfg; then
                set show_panic_message=false
            fi
        elif [ -e /boot/grub/grub.cfg ]; then
            set prefix=($root)'/boot/grub'
            if configfile /boot/grub/grub.cfg; then
                set show_panic_message=false
            fi
        elif [ -e /grub2/grub.cfg ]; then
            if configfile /grub2/grub.cfg; then
                set show_panic_message=false
            fi
        else
            # No installed OS found — try the first-boot installer config
            if search -s -f -n /wootc/install/grub.install.cfg; then
                if configfile /wootc/install/grub.install.cfg; then
                    set show_panic_message=false
                fi
            fi
        fi
    fi
fi

# ── Fallback: boot from extracted install files ─────────────────────────────
if [ ${show_panic_message} = true ]; then
    if search -s -f -n /wootc/install/boot/grub/grub.cfg; then
        if configfile /wootc/install/boot/grub/grub.cfg; then
            set show_panic_message=false
        fi
    else
        if search -s -f -n /grub.cfg; then
            if configfile /grub.cfg; then
                set show_panic_message=false
            fi
        fi
    fi
fi

# ── Nothing worked — tell the user ─────────────────────────────────────────
if [ ${show_panic_message} = true ]; then
    echo "wootc: Could not boot from the installed image."
    echo ""
    echo "Possible causes:"
    echo "  - The installation did not complete. Reboot into Windows and"
    echo "    run wootc.exe again."
    echo "  - The Windows filesystem is corrupted. Reboot into Windows"
    echo "    and run: chkdsk /r"
    echo "  - root.disk was moved or deleted."
    echo ""
    echo "For help: https://github.com/tuna-os/wootc"
fi
