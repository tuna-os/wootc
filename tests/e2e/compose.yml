# wootc e2e test — Windows 11 VM via dockur/windows
#
# Key control-plane facts:
#
#   dockur/windows uses a TAP bridge (172.30.x.x) inside the container, but
#   the E2E control plane does not require guest networking. QGA runs over the
#   private virtio-serial socket below.
#
#   autounattend.xml mounts at /custom/autounattend.xml — dockur bakes it
#   into the Windows installer ISO automatically.

services:
  windows:
    image: dockurr/windows
    container_name: wootc-e2e-windows
    stop_grace_period: 2m
    environment:
      VERSION: "11"
      EDITION: "pro"          # Pro edition required by the Windows target
      USERNAME: "wootc"
      PASSWORD: "wootc-test-123!"
      CPU_CORES: "4"
      RAM_SIZE: "8G"
      DISK_SIZE: "80G"
      DISK_FMT: "qcow2"
      BOOT_MODE: "windows_secure"   # UEFI + Secure Boot
      TPM: "Y"                      # Windows 11 setup requires TPM 2.0
      MANUAL: "N"                   # Fully unattended install
      LANGUAGE: "en-US"
      KEYBOARD: "en-US"
      # Override Dockur's default SERIAL=mon:stdio to write directly to a
      # persistent file on the mounted /storage volume.  The QEMU monitor is
      # still available via the Unix socket in /run/shm/monitor.sock for live
      # diagnostics.  This file survives container teardown and single-handedly
      # made the Secure-Boot-rejects-wubildr bug visible.
      SERIAL: "file:/storage/deployer-serial.log"
      # QEMU internal debug log — captures firmware TPL state, PCI enumeration,
      # boot device selection, and verbose errors.  Disabled by default because
      # it is extremely verbose (~10 MB per boot).  Set to "Y" when tracking
      # UEFI / Secure Boot / firmware-path issues.
      # QEMU_LOG: "Y"
      # Private host-to-guest control channel. The Windows OEM bootstrap
      # installs qemu-ga-x86_64.msi, after which the runner uses guest-exec and
      # guest-file-* instead of WinRM or guest networking.
      # Deployer disk (storage/deployer.qcow2): a small FAT32 volume holding
      # the deployer kernel+initramfs so GRUB (via shim/Secure Boot) can load
      # them without NTFS support.
      ARGUMENTS: >-
        -chardev socket,id=qga0,path=/run/shm/qga.sock,server=on,wait=off
        -device virtio-serial
        -device virtserialport,chardev=qga0,name=org.qemu.guest_agent.0
        -drive file=/storage/deployer.qcow2,id=deployer,format=qcow2,if=none
        -device virtio-blk-pci,drive=deployer
      # USER_PORTS is not needed: QGA is private and does not use guest TCP.
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    # Kanpur's default rootful Podman DNS path intermittently cannot resolve
    # Microsoft's download hosts. Use a reachable public resolver for the
    # one-time Windows installer acquisition.
    dns:
      - 1.1.1.1
    ports:
      - "8006:8006"    # noVNC web console  — browse to http://localhost:8006 to watch/debug
      - "3389:3389"    # RDP                — for manual debugging
      - "5900:5900"    # QEMU VNC           — fallback debugging
    volumes:
      # VM disk and QEMU artifacts (data.qcow2, qemu.pty, monitor.sock, etc.)
      - ./storage:/storage
      # Deployer files: deployer-vmlinuz, deployer-initramfs.img, grubx64.efi, grub configs — shared as Samba \\host.lan\Data
      - ./wootc-files:/shared
      # OEM files are injected by Dockur into C:\OEM during setup. They provide
      # a local QGA bootstrap and the wootc payload.
      - ./oem:/oem:ro
      # Custom Windows answer file — dockur expects this at /custom.xml (a FILE, not a directory).
      # This configures unattended GPT setup and the SYSTEM bootstrap task.
      - ./autounattend.xml:/custom.xml:ro
    restart: "no"     # Don't auto-restart — test orchestrator manages lifecycle
