---
# wootc e2e test — Windows 11 VM via dockur/windows
#
# Key control-plane facts:
#
#   dockur/windows uses a TAP bridge (172.30.x.x) inside the container, but
#   the E2E control plane does not require guest networking. QGA runs over the
#   private virtio-serial socket below.
#
#   autounattend.xml mounts at /custom/autounattend.xml — dockur bakes it
#   into the Windows installer ISO automatically.

services:
  windows:
    # localhost/wootc-e2e-windows-ssh:latest = dockurr/windows + baked-in
    # sshd (key-only, dedicated e2e keypair) so debug sessions can `ssh`
    # straight into the container instead of nesting `podman exec` through
    # heredocs. Build it once with tests/e2e/build-ssh-image.sh; override
    # with WOOTC_E2E_IMAGE=dockurr/windows to use the plain upstream image.
    image: ${WOOTC_E2E_IMAGE:-localhost/wootc-e2e-windows-ssh:latest}
    container_name: wootc-e2e-windows
    # Rootless runners can select slirp4netns to bypass a host's broken
    # bridge/Aardvark forwarding path: WOOTC_E2E_NETWORK_MODE=slirp4netns.
    # The normal bridge remains the default for KVM-capable rootful runners.
    network_mode: ${WOOTC_E2E_NETWORK_MODE:-bridge}
    stop_grace_period: 2m
    environment:
      # Windows case selector (matrix). Dockur version strings: 11/10 (Pro),
      # 11e/10e (Enterprise Eval), 11l/10l (LTSC). run-e2e.sh exports these.
      VERSION: "${WOOTC_E2E_WIN_VERSION:-11}"
      EDITION: "${WOOTC_E2E_WIN_EDITION:-pro}"
      USERNAME: "wootc"
      PASSWORD: "wootc-test-123!"
      CPU_CORES: "4"
      # Dockur may clamp this to available host memory; run-e2e.sh verifies
      # the resulting QEMU allocation before waiting for Windows Setup.
      RAM_SIZE: "${WOOTC_E2E_RAM_SIZE:-8G}"
      DISK_SIZE: "80G"
      DISK_FMT: "qcow2"
      # Optional spare disk for the Phase-3 graduate-to-native target (rung 3).
      # Empty by default; the rung-3 harness sets WOOTC_E2E_DISK2_SIZE=40G so
      # guest gets a blank second drive that `wootc-go-native migrate --to-disk`
      # installs onto — no shrink of the running NTFS required.
      DISK2_SIZE: "${WOOTC_E2E_DISK2_SIZE:-}"
      BOOT_MODE: "windows_secure"   # UEFI + Secure Boot
      TPM: "Y"                      # Windows 11 setup requires TPM 2.0
      MANUAL: "N"                   # Fully unattended install
      # Keep bash supervisor as PID 1 so container survives QEMU reboots
      SHUTDOWN: "Y"
      # 24h SIGTERM timeout floor so power.sh never kills QEMU
      QEMU_TIMEOUT: "86400"
      LANGUAGE: "en-US"
      KEYBOARD: "en-US"
      # Keep SERIAL at Dockur's default (mon:stdio) — Dockur reads the
      # serial console to detect QEMU boot progress.  Add a second serial
      # port backed by a file in ARGUMENTS for persistent post-mortem logs.
      # SERIAL: "file:/storage/deployer-serial.log"
      # QEMU internal debug log — captures firmware TPL state, PCI enumeration,
      # boot device selection, and verbose errors.  Disabled by default because
      # it is extremely verbose (~10 MB per boot).  Set to "Y" when tracking
      # UEFI / Secure Boot / firmware-path issues.
      # QEMU_LOG: "Y"
      ARGUMENTS: >-
        -chardev socket,id=qga0,path=/run/shm/qga.sock,server=on,wait=off
        -device virtio-serial
        -device virtserialport,chardev=qga0,name=org.qemu.guest_agent.0
      # USER_PORTS is not needed: QGA is private and does not use guest TCP.
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    # Kanpur's default rootful Podman DNS path intermittently cannot resolve
    # Microsoft's download hosts. Use a reachable public resolver for the
    # one-time Windows installer acquisition.
    dns:
      - 1.1.1.1
    ports:
      - "${WOOTC_E2E_NOVNC_PORT:-8006}:8006"  # noVNC web console
      - "${WOOTC_E2E_RDP_PORT:-3389}:3389"    # RDP
      - "${WOOTC_E2E_VNC_PORT:-5900}:5900"    # QEMU VNC fallback
      - "${WOOTC_E2E_SSH_PORT:-2222}:22"      # sshd debug shell
      # WebView2 remote-debugging endpoint of the real wootc.exe, used by the
      # --gui-cdp leg to drive the genuine GUI (not the mock) from the host.
      # Dockur NATs container ports through to the guest, so this reaches
      # wootc.exe running inside Windows.
      - "${WOOTC_E2E_CDP_PORT:-9222}:9222"    # WebView2 CDP (real GUI E2E)
    volumes:
      # VM disk and QEMU artifacts (data.qcow2, qemu.pty, monitor.sock, etc.)
      - ./storage:/storage
      # Dockur only creates DISK2_SIZE when /storage2 exists. Keep the Phase-3
      # graduate target isolated from the Windows disk and normal artifacts.
      - ./storage/phase3:/storage2
      # Deployer files: deployer-vmlinuz, deployer-initramfs.img,
      # grubx64.efi, grub configs — shared as Samba \\host.lan\Data
      - ./wootc-files:/shared
      # OEM files are injected by Dockur into C:\OEM during setup. They provide
      # a local QGA bootstrap and the wootc payload.
      - ./oem:/oem:ro
      # Custom Windows answer file — dockur expects this at /custom.xml
      # (a FILE, not a directory). run-e2e.sh renders it per Windows case
      # (product key → edition) from autounattend.xml before compose up.
      - ./storage/autounattend.rendered.xml:/custom.xml:ro
    restart: "unless-stopped"     # Keep VM alive if Windows reboots post-setup
