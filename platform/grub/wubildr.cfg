# wootc GRUB2 boot configuration
# Adapted from wubiuefi's wubildr.cfg
#
# This file is loaded by GRUB2 after chainloading from Windows Boot Manager.
# Dynamic VHDX cannot be loop-mounted by GRUB. The supported Secure Boot path
# loads the deployer and Phase-2 kernel from the ESP; this legacy file only
# retains the first-boot installer fallback.

set show_panic_message=true

# ── Fallback: boot from extracted install files ─────────────────────────────
if [ ${show_panic_message} = true ]; then
    if search -s -f -n /wootc/install/boot/grub/grub.cfg; then
        if configfile /wootc/install/boot/grub/grub.cfg; then
            set show_panic_message=false
        fi
    else
        if search -s -f -n /grub.cfg; then
            if configfile /grub.cfg; then
                set show_panic_message=false
            fi
        fi
    fi
fi

# ── Nothing worked — tell the user ─────────────────────────────────────────
if [ ${show_panic_message} = true ]; then
    echo "wootc: Could not boot from the installed image."
    echo ""
    echo "Possible causes:"
    echo "  - The installation did not complete. Reboot into Windows and"
    echo "    run wootc.exe again."
    echo "  - The Windows filesystem is corrupted. Reboot into Windows"
    echo "    and run: chkdsk /r"
    echo "  - root.vhdx was moved or deleted."
    echo ""
    echo "For help: https://github.com/tuna-os/wootc"
fi
