name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ShellCheck
        run: |
          shellcheck --severity=warning \
            payload/deployer/*.sh \
            platform/dracut/99wootc-boot/*.sh \
            tests/e2e/run-e2e.sh

      - name: yamllint
        run: |
          pip install yamllint
          yamllint tests/e2e/compose.yml

      - name: Validate autounattend.xml
        run: |
          pip install xmlschema
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('tests/e2e/autounattend.xml')
          print('XML is well-formed')
          root = tree.getroot()
          assert root.tag == '{urn:schemas-microsoft-com:unattend}unattend'
          print('Root element is unattend')
          "

  build-deployer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install podman
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq podman

      - name: Build deployer
        run: |
          podman build -f payload/deployer/Containerfile -t wootc-deployer .

      - name: Extract artifacts
        run: |
          podman run --rm --entrypoint /bin/cat localhost/wootc-deployer /out/initramfs.img > deployer-initramfs.img
          podman run --rm --entrypoint /bin/cat localhost/wootc-deployer /out/vmlinuz > deployer-vmlinuz
          ls -lah deployer-initramfs.img deployer-vmlinuz

      - name: Upload deployer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wootc-deployer
          path: |
            deployer-initramfs.img
            deployer-vmlinuz
          retention-days: 7

  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd app/frontend
          npm install
          npm run build

      - name: Build wootc.exe (windows/amd64)
        run: |
          cd app
          GOOS=windows GOARCH=amd64 go build -tags desktop,production -ldflags "-w -s" -o wootc.exe .
          GOOS=windows GOARCH=amd64 go vet ./...

      - name: Build Linux migration dashboard
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q libgtk-3-dev libwebkit2gtk-4.1-dev
          cd app
          # ubuntu-24.04 ships webkit2gtk-4.1 only; wails needs the tag.
          go build -tags desktop,production,webkit2_41 -o wootc-dashboard .
          go vet ./...

      - name: Upload wootc.exe
        uses: actions/upload-artifact@v4
        with:
          name: wootc-exe
          path: app/wootc.exe
          retention-days: 7

  validate-recipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build fisherman
        run: |
          cd fisherman/fisherman
          go build -o /tmp/fisherman ./cmd/fisherman/

      - name: Validate default recipe
        run: |
          cat > /tmp/test-recipe.json << 'EOF'
          {
            "disk": "/dev/loop0",
            "filesystem": "xfs",
            "composeFsBackend": false,
            "bootloader": "grub2",
            "image": "ghcr.io/tuna-os/yellowfin:gnome",
            "hostname": "wootc-test",
            "flatpaks": []
          }
          EOF
          /tmp/fisherman validate /tmp/test-recipe.json
