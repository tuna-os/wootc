name: E2E nightly

# Nightly canary: runs the shared hosted-KVM E2E (see e2e-hosted.yml). The full
# image x edition x bitlocker matrix stays on the laptop runners.

on:
  workflow_dispatch:
    inputs:
      image:       { description: bootc image, default: 'ghcr.io/tuna-os/yellowfin:gnome' }
      win_version: { description: 'Dockur version (11, 10, 11e, 11l)', default: '11' }
      bitlocker:   { description: 'BitLocker/FDE axis (on|off)', default: 'off' }
      use_base_image: { description: 'Restore cached Windows base image (false = full install)', type: boolean, default: true }

permissions:
  contents: read
  packages: read                 # granted through to the reusable e2e-hosted (base-image pull)

concurrency:
  group: e2e-nightly
  cancel-in-progress: false

jobs:
  e2e:
    uses: ./.github/workflows/e2e-hosted.yml
    with:
      image:       ${{ inputs.image       || 'ghcr.io/tuna-os/yellowfin:gnome' }}
      win_version: ${{ inputs.win_version || '11' }}
      bitlocker:   ${{ inputs.bitlocker   || 'off' }}
      # Default true for scheduled runs (inputs null); a manual run can force a
      # full install with use_base_image=false.
      use_base_image: ${{ github.event.inputs.use_base_image != 'false' }}
