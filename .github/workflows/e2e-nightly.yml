name: E2E nightly (hosted KVM)

# A full Windows-VM E2E on a FREE GitHub-hosted runner. ubuntu-latest exposes
# /dev/kvm, so dockur/windows + QEMU/TPM/Secure Boot works — with three
# constraints this workflow is built around:
#
#   disk   ~14 GB free on / but ~70 GB on /mnt → storage/ is moved to /mnt and
#          the preinstalled toolchains are deleted first.
#   ram    16 GB total → the guest gets 6 GB, not the 8 GB the laptops use.
#   state  hosted runners keep nothing between runs, so --skip-install can never
#          apply: every run is a full Windows install (~45-85 min). That fits
#          inside the 6 h job cap but makes this a nightly smoke, not the matrix.
#
# The full image × Windows-edition matrix stays on the laptop runners
# (tests/e2e/run-matrix.sh) — this is the always-on canary.

on:
  schedule:
    - cron: '0 4 * * *'      # nightly 04:00 UTC
  workflow_dispatch:
    inputs:
      image:
        description: bootc image to install
        default: ghcr.io/tuna-os/yellowfin:gnome
      win_version:
        description: 'Dockur version string (11, 10, 11e, 11l)'
        default: '11'
      bitlocker:
        description: 'BitLocker/FDE axis (on|off)'
        default: 'off'

permissions:
  contents: read

concurrency:
  group: e2e-nightly
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 330          # under the 6 h hard cap, with headroom
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Confirm KVM is available
        run: |
          ls -l /dev/kvm || { echo "::error::no /dev/kvm on this runner"; exit 1; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-kvm podman podman-compose python3-pip
          pip install --quiet podman-compose || true
          # let the unprivileged runner user open /dev/kvm
          sudo usermod -aG kvm "$USER" || true
          sudo chmod 0666 /dev/kvm
          kvm-ok || true

      - name: Reclaim disk (hosted runners ship ~30 GB of toolchains)
        run: |
          df -h / /mnt || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
                      /usr/local/lib/node_modules /usr/share/swift || true
          sudo apt-get clean
          docker image prune -af 2>/dev/null || true
          echo "--- after cleanup ---"; df -h / /mnt

      - name: Put VM storage on /mnt (the only volume with room)
        run: |
          sudo mkdir -p /mnt/wootc-storage /mnt/wootc-iso
          sudo chown -R "$USER" /mnt/wootc-storage /mnt/wootc-iso
          rm -rf tests/e2e/storage tests/e2e/iso-cache
          ln -s /mnt/wootc-storage tests/e2e/storage
          ln -s /mnt/wootc-iso     tests/e2e/iso-cache
          df -h /mnt

      - name: Run the E2E (full Windows install — no persistence to skip)
        env:
          # 16 GB runner: leave headroom for podman + the deployer build.
          WOOTC_E2E_RAM_SIZE: 6G
          # 4 vCPU hosted runners are slower than the laptop runners;
          # the laptops themselves hit the 45 min default on big images.
          WOOTC_E2E_DEPLOY_TIMEOUT: '5400'   # 90 min
          WOOTC_E2E_WIN_VERSION: ${{ inputs.win_version || '11' }}
          WOOTC_E2E_BITLOCKER: ${{ inputs.bitlocker || 'off' }}
        run: |
          cd tests/e2e
          bash run-e2e.sh "${{ inputs.image || 'ghcr.io/tuna-os/yellowfin:gnome' }}"

      - name: Collect evidence
        if: always()
        run: |
          mkdir -p /tmp/evidence
          cp -r tests/e2e/storage/artifacts/. /tmp/evidence/ 2>/dev/null || true
          cp tests/e2e/storage/run-e2e.current /tmp/evidence/ 2>/dev/null || true
          # the raw serial is the single most useful post-mortem artifact
          cp tests/e2e/storage/qemu.pty /tmp/evidence/qemu-serial.log 2>/dev/null || true
          du -sh /tmp/evidence || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-nightly-${{ github.run_id }}
          path: /tmp/evidence
          retention-days: 14
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: |
          cd tests/e2e
          podman rm -f wootc-e2e-windows 2>/dev/null || true
