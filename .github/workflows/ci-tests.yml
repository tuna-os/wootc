name: tests

# Everything here runs on FREE GitHub-hosted runners with no VM, no KVM and no
# self-hosted anything — the fast bats suites, the cross-platform Go tests, the
# containerized migration integration suite, and the GUI screenshot render.
# These were being run by hand on laptops; they belong on every push/PR.
#
# The Windows-VM E2E is deliberately NOT here: it needs KVM + a full Windows
# install (~45-85 min) and has no persistent disk on hosted runners. See
# e2e-kvm.yml / tests/e2e/run-matrix.sh for that.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: fast tier (bats + go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: actions/setup-go@v7
        with: { go-version: '1.26', cache: false }
      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y -qq bats
      - name: Run fast tier
        run: bash tests/run.sh fast

  integration:
    name: migration integration (container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }
      - name: Run containerized bridge suite
        run: bash tests/migration/test-bridge.sh

  lint:
    name: lint (shellcheck + yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          pip install --quiet yamllint
      - name: yamllint
        run: yamllint tests/e2e/compose.yml
      - name: shellcheck (payloads + harness)
        run: |
          shellcheck -S error \
            payload/deployer/deploy.sh \
            payload/migration/wootc-go-native \
            payload/migration/wootc-wifi-bridge \
            payload/migration/wootc-wsl-bridge \
            payload/migration/wootc-apply-look \
            tests/e2e/run-e2e.sh

  gui-shots:
    name: GUI screenshots render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Render the Linux GUIs headlessly
        run: bash tests/gui/capture-linux-guis.sh
      - name: Fail if any screenshot came out blank
        run: |
          for f in docs/screenshots/1[3-6]-*.png; do
            sz=$(stat -c%s "$f")
            echo "$f: $sz bytes"
            [ "$sz" -gt 5000 ] || { echo "::error::$f is blank ($sz bytes)"; exit 1; }
          done
      - uses: actions/upload-artifact@v7
        with:
          name: linux-gui-screenshots
          path: docs/screenshots/1[3-6]-*.png
          if-no-files-found: error
