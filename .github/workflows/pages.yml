name: Pages (walkthrough)

# Publishes the committed `pages/` tree (the E2E walkthrough player + hero
# clip) to GitHub Pages. This runs on the GitHub-hosted ubuntu runner, so it
# does NOT depend on a self-hosted KVM runner — the visual is refreshed by
# committing new assets (see tests/e2e/publish-visual.sh), not by CI recording.

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - id: deployment
        uses: actions/deploy-pages@v5
