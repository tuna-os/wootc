name: E2E (hosted KVM, reusable)

# The single hosted-runner E2E definition, called by BOTH the nightly canary and
# the release gate — so a release is gated on exactly the run that has been
# proving itself every night, not a second, drifting copy.

on:
  workflow_call:
    inputs:
      image:       { type: string, default: 'ghcr.io/tuna-os/yellowfin:gnome' }
      win_version: { type: string, default: '11' }
      bitlocker:   { type: string, default: 'off' }
      # Force a full Windows install (skip the base-image restore). The restore
      # path (--skip-install on a snapshot) currently fails at the deployer-boot
      # handoff, so a full install is the reliable path to Phase 2 — and the only
      # way to diagnose the Phase-2 attach while the restore path is unfixed.
      use_base_image: { type: boolean, default: true }

permissions:
  contents: read
  packages: read                 # pull the pre-installed Windows base image

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 330          # under the 6 h hard cap, with headroom
    steps:
      - uses: actions/checkout@v7
        with: { submodules: recursive }

      - name: Confirm KVM is available
        run: |
          ls -l /dev/kvm || { echo "::error::no /dev/kvm on this runner"; exit 1; }
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-kvm podman podman-compose python3-pip
          pip install --quiet podman-compose || true
          # let the unprivileged runner user open /dev/kvm
          sudo usermod -aG kvm "$USER" || true
          sudo chmod 0666 /dev/kvm
          kvm-ok || true

      - name: Reclaim disk (hosted runners ship ~30 GB of toolchains)
        run: |
          df -h / /mnt || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
                      /usr/local/lib/node_modules /usr/share/swift || true
          sudo apt-get clean
          docker image prune -af 2>/dev/null || true
          echo "--- after cleanup ---"; df -h / /mnt

      - name: Put VM storage on /mnt (the only volume with room)
        run: |
          sudo mkdir -p /mnt/wootc-storage /mnt/wootc-iso
          sudo chown -R "$USER" /mnt/wootc-storage /mnt/wootc-iso
          rm -rf tests/e2e/storage tests/e2e/iso-cache
          ln -s /mnt/wootc-storage tests/e2e/storage
          ln -s /mnt/wootc-iso     tests/e2e/iso-cache
          df -h /mnt

      # Best-effort: pull a pre-installed Windows base image (primed by
      # e2e-snapshot.yml) so run-e2e.sh restores it instead of reinstalling
      # Windows. A miss (no such tag / stale key) is fine — run-e2e.sh falls
      # back to a full install, so this never gates a run.
      - name: Pull pre-installed Windows base image (if present)
        if: ${{ inputs.use_base_image }}
        continue-on-error: true
        run: |
          set -euo pipefail
          VERSION=1.2.0
          curl -fsSL -o oras.tar.gz \
            "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          tar -xzf oras.tar.gz oras && sudo install -m 0755 oras /usr/local/bin/oras
          PKG="ghcr.io/${{ github.repository_owner }}/wootc-winbase"
          TAG="${{ inputs.win_version }}-bl-${{ inputs.bitlocker }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo mkdir -p /mnt/wootc-snapshot && sudo chown "$USER" /mnt/wootc-snapshot
          if oras pull "${PKG}:${TAG}" -o /mnt/wootc-snapshot; then
            echo "WOOTC_E2E_SNAPSHOT_IN=/mnt/wootc-snapshot" >> "$GITHUB_ENV"
            echo "Restored base image ${PKG}:${TAG}"; ls -lh /mnt/wootc-snapshot
          else
            echo "No base image ${PKG}:${TAG}; run-e2e.sh will do a full install"
          fi

      - name: Run the E2E (restores base image if pulled, else full install)
        env:
          # 16 GB runner: leave headroom for podman + the deployer build.
          WOOTC_E2E_RAM_SIZE: 6G
          # 4 vCPU hosted runners are slower than the laptop runners;
          # the laptops themselves hit the 45 min default on big images.
          WOOTC_E2E_DEPLOY_TIMEOUT: '5400'   # 90 min
          WOOTC_E2E_WIN_VERSION: ${{ inputs.win_version }}
          WOOTC_E2E_BITLOCKER: ${{ inputs.bitlocker }}
          # WOOTC_E2E_SNAPSHOT_IN is set by the pull step above on a cache hit.
        run: |
          cd tests/e2e
          bash run-e2e.sh "${{ inputs.image }}"

      - name: Collect evidence
        if: always()
        run: |
          mkdir -p /tmp/evidence
          cp -r tests/e2e/storage/artifacts/. /tmp/evidence/ 2>/dev/null || true
          cp tests/e2e/storage/run-e2e.current /tmp/evidence/ 2>/dev/null || true
          # the raw serial is the single most useful post-mortem artifact
          cp tests/e2e/storage/qemu.pty /tmp/evidence/qemu-serial.log 2>/dev/null || true
          du -sh /tmp/evidence || true

      # DISK-LEVEL POST-MORTEM. The lesson from the Phase-2 attach bug: disk
      # archaeology beats serial capture. The deployer's serial is overwritten by
      # the Phase-2 boot, and its persistent log (C:\wootc\logs\deployer.log) is
      # unreachable over QGA once Phase 2 lands in a Linux emergency shell — but
      # both, plus the actual BOOTED initramfs, are sitting in data.qcow2. Read
      # them with libguestfs so every hosted run is self-diagnosing without SSH.
      # Surfaces: the guard verdict, AND whether wootc-attach.service is present
      # AND WIRED (a dangling wants symlink is the exact bug that hid for a week).
      - name: Disk post-mortem (libguestfs)
        if: always()
        continue-on-error: true
        run: |
          set +e
          D=tests/e2e/storage/data.qcow2
          [ -f "$D" ] || { echo "no data.qcow2 — nothing to inspect"; exit 0; }
          sudo apt-get install -y -qq libguestfs-tools >/dev/null 2>&1
          export LIBGUESTFS_BACKEND=direct
          mkdir -p /tmp/evidence
          virt-filesystems -a "$D" --long > /tmp/evidence/disk-filesystems.txt 2>&1
          # Deployer's persistent log (guard verdict lives here); inspection mounts Windows C:.
          virt-cat -a "$D" /wootc/logs/deployer.log > /tmp/evidence/deployer.log 2>/dev/null
          echo "=== GUARD VERDICT (from deployer.log) ==="
          grep -aE 'guard:|dracut regen|WIRED|wired|matches=|unit file present' /tmp/evidence/deployer.log 2>/dev/null | tail -15
          # The BOOTED Phase-2 initramfs from the ESP: present AND wired?
          ESP=$(virt-filesystems -a "$D" -l 2>/dev/null | awk '$2=="vfat"{print $1; exit}')
          if [ -n "$ESP" ]; then
            virt-cat -a "$D" -m "$ESP" /EFI/wootc/phase2-initramfs.img > /tmp/p2.img 2>/dev/null
            if [ -s /tmp/p2.img ]; then
              lsinitrd /tmp/p2.img > /tmp/evidence/phase2-initramfs-list.txt 2>/dev/null
              WIRED=$(grep -cE 'initrd-root-device.target.wants/wootc-attach.service' /tmp/evidence/phase2-initramfs-list.txt)
              UNIT=$(grep -cE 'usr/lib/systemd/system/wootc-attach\.service$' /tmp/evidence/phase2-initramfs-list.txt)
              echo "=== BOOTED Phase-2 initramfs: wootc-attach wants-symlink=$WIRED unit-file=$UNIT ==="
              [ "$WIRED" -ge 1 ] && [ "$UNIT" -lt 1 ] && echo "::warning::DANGLING wootc-attach.service — wants symlink present but unit file absent (root.disk will never attach)"
            fi
          fi
          du -sh /tmp/evidence || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-nightly-${{ github.run_id }}
          path: /tmp/evidence
          retention-days: 14
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: |
          cd tests/e2e
          podman rm -f wootc-e2e-windows 2>/dev/null || true
